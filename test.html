<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ETCC Dashboard — Regression Test</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #f5f5f7; color: #1d1d1f; padding: 2rem; }
    h1 { font-size: 1.4rem; margin-bottom: 1.5rem; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; }
    th { background: #dbeafe; text-align: left; padding: 0.6rem 1rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
    td { padding: 0.6rem 1rem; border-top: 1px solid #d2d2d7; font-size: 0.9rem; }
    .pass { color: #1a7f37; font-weight: 700; }
    .fail { color: #c62828; font-weight: 700; }
    #summary { margin-top: 1.25rem; font-weight: 700; font-size: 1rem; }
  </style>
</head>
<body>
  <h1>ETCC Dashboard — Regression Test</h1>
  <table>
    <thead>
      <tr><th>#</th><th>Test</th><th>Result</th><th>Detail</th></tr>
    </thead>
    <tbody id="results"></tbody>
  </table>
  <div id="summary"></div>

  <script>
    const tests = [
      {
        name: 'Page title is correct',
        fn: () => {
          const t = document.title;
          return { pass: t.includes('ETCC') && t.includes('East Tennessee'), detail: t };
        }
      },
      {
        name: 'Header logo image present',
        fn: () => {
          const img = document.querySelector('header img');
          return { pass: !!img && img.src.includes('ETCClogo.png'), detail: img ? img.src : 'not found' };
        }
      },
      {
        name: 'Header title text correct',
        fn: () => {
          const el = document.querySelector('.header-title');
          return { pass: !!el && el.textContent.includes('East Tennessee Corvette Club'), detail: el ? el.textContent.trim() : 'not found' };
        }
      },
      {
        name: 'Hero logo image present',
        fn: () => {
          const img = document.querySelector('.hero-logo');
          return { pass: !!img && img.src.includes('ETCClogo.png'), detail: img ? img.src : 'not found' };
        }
      },
      {
        name: 'Hero heading present',
        fn: () => {
          const el = document.querySelector('.hero h1');
          return { pass: !!el && el.textContent.includes('ETCC Apps'), detail: el ? el.textContent.trim() : 'not found' };
        }
      },
      {
        name: 'Silent Auction Manager card present',
        fn: () => {
          const cards = Array.from(document.querySelectorAll('.card-name'));
          const found = cards.find(c => c.textContent.includes('Silent Auction Manager'));
          return { pass: !!found, detail: found ? found.textContent.trim() : 'not found' };
        }
      },
      {
        name: 'Silent Auction Manager links to correct URL',
        fn: () => {
          const a = document.querySelector('a.app-card');
          return { pass: !!a && a.href.includes('etccapps.com/apps/sam'), detail: a ? a.href : 'not found' };
        }
      },
      {
        name: 'Silent Auction Manager badge shows Live',
        fn: () => {
          const badge = document.querySelector('.badge-live');
          return { pass: !!badge && badge.textContent.trim() === 'Live', detail: badge ? badge.textContent.trim() : 'not found' };
        }
      },
      {
        name: 'Coming Soon card present',
        fn: () => {
          const card = document.querySelector('.app-card.coming-soon');
          return { pass: !!card, detail: card ? card.querySelector('.card-name').textContent.trim() : 'not found' };
        }
      },
      {
        name: 'Coming Soon badge present',
        fn: () => {
          const badge = document.querySelector('.badge-soon');
          return { pass: !!badge && badge.textContent.includes('Coming Soon'), detail: badge ? badge.textContent.trim() : 'not found' };
        }
      },
      {
        name: 'Footer contains etccapps.com',
        fn: () => {
          const footer = document.querySelector('footer');
          return { pass: !!footer && footer.textContent.includes('etccapps.com'), detail: footer ? footer.textContent.trim().substring(0, 60) : 'not found' };
        }
      },
      {
        name: 'Footer copyright year present',
        fn: () => {
          const footer = document.querySelector('footer');
          return { pass: !!footer && footer.textContent.includes('2026'), detail: footer ? '2026 found' : 'not found' };
        }
      }
    ];

    const tbody = document.getElementById('results');
    let passed = 0;

    tests.forEach((t, i) => {
      let result;
      try { result = t.fn(); } catch(e) { result = { pass: false, detail: e.message }; }
      if (result.pass) passed++;
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${i+1}</td><td>${t.name}</td><td class="${result.pass ? 'pass' : 'fail'}">${result.pass ? 'PASS' : 'FAIL'}</td><td style="color:#6e6e73">${result.detail}</td>`;
      tbody.appendChild(tr);
    });

    const summary = document.getElementById('summary');
    const total = tests.length;
    summary.textContent = `${passed} / ${total} tests passed`;
    summary.style.color = passed === total ? '#1a7f37' : '#c62828';
  </script>

  <script>
    // Load index.html content into an iframe to test against real DOM
    // Tests run against this page's own DOM after iframe injects content
  </script>

  <iframe src="index.html" id="target" style="display:none"></iframe>
  <script>
    // Re-run tests against the iframe DOM once loaded
    const iframe = document.getElementById('target');
    iframe.addEventListener('load', () => {
      const doc = iframe.contentDocument;
      tbody.innerHTML = '';
      let p = 0;

      const iframeTests = tests.map(t => ({
        name: t.name,
        fn: () => {
          // Rebind document-scoped queries to iframe doc
          const origQ = document.querySelector.bind(document);
          const origQA = document.querySelectorAll.bind(document);
          const origTitle = document.title;
          document.querySelector = doc.querySelector.bind(doc);
          document.querySelectorAll = doc.querySelectorAll.bind(doc);
          Object.defineProperty(document, 'title', { get: () => doc.title, configurable: true });
          let r;
          try { r = t.fn(); } finally {
            document.querySelector = origQ;
            document.querySelectorAll = origQA;
            Object.defineProperty(document, 'title', { get: () => origTitle, configurable: true });
          }
          return r;
        }
      }));

      iframeTests.forEach((t, i) => {
        let result;
        try { result = t.fn(); } catch(e) { result = { pass: false, detail: e.message }; }
        if (result.pass) p++;
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${i+1}</td><td>${t.name}</td><td class="${result.pass ? 'pass' : 'fail'}">${result.pass ? 'PASS' : 'FAIL'}</td><td style="color:#6e6e73">${result.detail}</td>`;
        tbody.appendChild(tr);
      });

      summary.textContent = `${p} / ${iframeTests.length} tests passed`;
      summary.style.color = p === iframeTests.length ? '#1a7f37' : '#c62828';
    });
  </script>
</body>
</html>
