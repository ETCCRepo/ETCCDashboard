<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ETCC Dashboard — Regression Tests</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    body { font-family: -apple-system, sans-serif; background: #f5f5f7; color: #1d1d1f; padding: 2rem; }
    h1 { font-size: 1.4rem; margin-bottom: 0.4rem; }
    .sub { color: #6e6e73; font-size: 0.875rem; margin-bottom: 1.5rem; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    th { background: #dbeafe; text-align: left; padding: 0.6rem 1rem; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; }
    td { padding: 0.6rem 1rem; border-top: 1px solid #d2d2d7; font-size: 0.9rem; }
    .pass { color: #1a7f37; font-weight: 700; }
    .fail { color: #c62828; font-weight: 700; }
    #summary { margin-top: 1.25rem; font-weight: 700; font-size: 1rem; }
    #status  { color: #6e6e73; font-size: 0.875rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <h1>ETCC Dashboard — Regression Tests</h1>
  <div class="sub">Fetches index.html and validates key DOM elements via DOMParser.</div>
  <div id="status">Loading index.html...</div>
  <table>
    <thead><tr><th>#</th><th>Test</th><th>Result</th><th>Detail</th></tr></thead>
    <tbody id="results"></tbody>
  </table>
  <div id="summary"></div>

  <script>
    const tests = [
      {
        name: 'Page title contains ETCC and East Tennessee',
        fn: doc => {
          const t = doc.querySelector('title')?.textContent || '';
          return { pass: t.includes('ETCC') && t.includes('East Tennessee'), detail: t };
        }
      },
      {
        name: 'Header logo image present',
        fn: doc => {
          const img = doc.querySelector('header img');
          return { pass: !!img && img.getAttribute('src')?.includes('ETCClogo'), detail: img ? img.getAttribute('src') : 'not found' };
        }
      },
      {
        name: 'Header title text correct',
        fn: doc => {
          const el = doc.querySelector('.header-title');
          return { pass: !!el && el.textContent.includes('East Tennessee Corvette Club'), detail: el ? el.textContent.trim() : 'not found' };
        }
      },
      {
        name: 'Hero logo image present',
        fn: doc => {
          const img = doc.querySelector('.hero-logo');
          return { pass: !!img && img.getAttribute('src')?.includes('ETCClogo'), detail: img ? img.getAttribute('src') : 'not found' };
        }
      },
      {
        name: 'Hero heading contains ETCC Apps',
        fn: doc => {
          const el = doc.querySelector('.hero h1');
          return { pass: !!el && el.textContent.includes('ETCC Dashboard'), detail: el ? el.textContent.trim() : 'not found' };
        }
      },
      {
        name: 'Silent Auction Manager card present',
        fn: doc => {
          const cards = Array.from(doc.querySelectorAll('.card-name'));
          const found = cards.find(c => c.textContent.includes('Silent Auction Manager (SAM)'));
          return { pass: !!found, detail: found ? found.textContent.trim() : 'not found' };
        }
      },
      {
        name: 'SAM card has data-url pointing to etccapps.com/apps/sam',
        fn: doc => {
          const card = Array.from(doc.querySelectorAll('.app-card')).find(el => el.dataset.url?.includes('etccapps.com/apps/sam'));
          return { pass: !!card, detail: card ? card.dataset.url : 'not found' };
        }
      },
      {
        name: 'Live badge present on SAM card',
        fn: doc => {
          const badge = doc.querySelector('.badge-live');
          return { pass: !!badge && badge.textContent.trim() === 'Live', detail: badge ? badge.textContent.trim() : 'not found' };
        }
      },
      {
        name: 'Coming Soon card present',
        fn: doc => {
          const card = doc.querySelector('.app-card.coming-soon');
          return { pass: !!card, detail: card ? card.querySelector('.card-name')?.textContent.trim() : 'not found' };
        }
      },
      {
        name: 'Coming Soon badge present',
        fn: doc => {
          const badge = doc.querySelector('.badge-soon');
          return { pass: !!badge && badge.textContent.includes('Coming Soon'), detail: badge ? badge.textContent.trim() : 'not found' };
        }
      },
      {
        name: 'Footer contains club email',
        fn: doc => {
          const f = doc.querySelector('footer');
          return { pass: !!f && f.textContent.includes('etccwebsite.webmanager@gmail.com'), detail: f ? f.textContent.trim().substring(0, 60) : 'not found' };
        }
      },
      {
        name: 'Footer copyright 2026',
        fn: doc => {
          const f = doc.querySelector('footer');
          return { pass: !!f && f.textContent.includes('2026'), detail: f ? '2026 found' : 'not found' };
        }
      },
      {
        name: 'Settings nav item present',
        fn: doc => {
          const el = doc.getElementById('nav-settings');
          return { pass: !!el, detail: el ? el.textContent.trim() : 'not found' };
        }
      },
      {
        name: 'Password modal present',
        fn: doc => {
          const el = doc.getElementById('pwModal');
          return { pass: !!el, detail: el ? 'found' : 'not found' };
        }
      },
      {
        name: 'Regression test button present in Settings',
        fn: doc => {
          const btn = doc.querySelector('#page-settings .btn');
          return { pass: !!btn && btn.textContent.includes('Regression'), detail: btn ? btn.textContent.trim() : 'not found' };
        }
      },
      {
        name: 'Favicon .ico link present',
        fn: doc => {
          const link = Array.from(doc.querySelectorAll('link[rel="icon"]')).find(l => l.getAttribute('href')?.includes('favicon.ico'));
          return { pass: !!link, detail: link ? link.getAttribute('href') : 'not found' };
        }
      },
      {
        name: 'Header has role="banner"',
        fn: doc => {
          const el = doc.querySelector('header[role="banner"]');
          return { pass: !!el, detail: el ? 'found' : 'not found' };
        }
      },
      {
        name: 'Main landmark present',
        fn: doc => {
          const el = doc.querySelector('main');
          return { pass: !!el, detail: el ? el.tagName.toLowerCase() : 'not found' };
        }
      },
      {
        name: 'Footer has role="contentinfo"',
        fn: doc => {
          const el = doc.querySelector('footer[role="contentinfo"]');
          return { pass: !!el, detail: el ? 'found' : 'not found' };
        }
      },
      {
        name: 'Password modal has ARIA dialog attributes',
        fn: doc => {
          const el = doc.getElementById('pwModal');
          const hasRole  = el?.getAttribute('role') === 'dialog';
          const hasModal = el?.getAttribute('aria-modal') === 'true';
          return { pass: !!el && hasRole && hasModal, detail: el ? `role=${el.getAttribute('role')} aria-modal=${el.getAttribute('aria-modal')}` : 'not found' };
        }
      },
      {
        name: 'Footer version line contains <time> element',
        fn: doc => {
          const t = doc.querySelector('footer time');
          return { pass: !!t && !!t.getAttribute('datetime'), detail: t ? `datetime=${t.getAttribute('datetime')} text=${t.textContent.trim()}` : 'not found' };
        }
      },
      {
        name: 'Skip-nav link present',
        fn: doc => {
          const el = doc.querySelector('a.skip-nav, a[href="#main-content"]');
          return { pass: !!el, detail: el ? el.textContent.trim() : 'not found' };
        }
      },
      {
        name: 'SAM card emoji not corrupted (trophy \u{1F3C6})',
        fn: doc => {
          const el = doc.querySelector('.card-icon.red');
          const text = el ? el.textContent.trim() : '';
          const pass = text === '\u{1F3C6}' && !text.includes('ð');
          return { pass, detail: el ? `codepoints: ${[...text].map(c => 'U+' + c.codePointAt(0).toString(16).toUpperCase()).join(' ')}` : 'element not found' };
        }
      },
      {
        name: 'Coming Soon card emoji not corrupted (boom \u{1F4A5})',
        fn: doc => {
          const el = doc.querySelector('.card-icon.blue');
          const text = el ? el.textContent.trim() : '';
          const pass = text === '\u{1F4A5}' && !text.includes('ð');
          return { pass, detail: el ? `codepoints: ${[...text].map(c => 'U+' + c.codePointAt(0).toString(16).toUpperCase()).join(' ')}` : 'element not found' };
        }
      }
    ];

    fetch('index.html')
      .then(r => r.text())
      .then(html => {
        const doc = new DOMParser().parseFromString(html, 'text/html');
        document.getElementById('status').textContent = 'Running ' + tests.length + ' tests against index.html...';

        const tbody = document.getElementById('results');
        let passed = 0;

        tests.forEach((t, i) => {
          let result;
          try { result = t.fn(doc); } catch(e) { result = { pass: false, detail: e.message }; }
          if (result.pass) passed++;
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${i+1}</td><td>${t.name}</td><td class="${result.pass ? 'pass' : 'fail'}">${result.pass ? 'PASS' : 'FAIL'}</td><td style="color:#6e6e73">${result.detail ?? ''}</td>`;
          tbody.appendChild(tr);
        });

        const summary = document.getElementById('summary');
        summary.textContent = `${passed} / ${tests.length} tests passed`;
        summary.style.color = passed === tests.length ? '#1a7f37' : '#c62828';
        document.getElementById('status').textContent = '';
      })
      .catch(err => {
        document.getElementById('status').textContent = 'Error loading index.html: ' + err.message;
      });
  </script>
</body>
</html>
